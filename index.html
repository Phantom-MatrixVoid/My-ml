<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>KrishiMitr - Disease Detection</title>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: "Poppins", sans-serif;
  background: linear-gradient(180deg,#f6e2cc 0%,#f7f9f8 50%,#dceee3 100%);
}

/* NAVBAR */
.top-nav {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 70px;
  background: linear-gradient(90deg,#ff9933,#ffffff,#138808);
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 20px;
  z-index: 1000;
}

.brand {
  font-weight: 800;
  color: #0a3d62;
}

.menu-btn {
  font-size: 22px;
  cursor: pointer;
  background: none;
  border: none;
}

/* SIDEBAR */
.sidebar {
  position: fixed;
  top: 70px;
  left: -260px;
  width: 250px;
  height: calc(100% - 70px);
  background: #0a3d62;
  color: white;
  padding: 20px;
  transition: 0.3s;
  z-index: 999;
}

.sidebar.active {
  left: 0;
}

.sidebar a {
  display: block;
  padding: 12px;
  color: white;
  text-decoration: none;
  border-radius: 8px;
  margin-bottom: 10px;
}

.sidebar a:hover {
  background: #1e3a8a;
}

/* OVERLAY (mobile) */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.3);
  display: none;
  z-index: 998;
}

.overlay.show {
  display: block;
}

/* MAIN */
.main {
  margin-top: 90px;
  padding: 20px;
  display: flex;
  justify-content: center;
  transition: margin-left 0.3s ease;
}

/* SHIFT ONLY ON DESKTOP */
@media(min-width: 768px) {
  .main.shift {
    margin-left: 250px;
  }
}

/* CARD */
.card {
  width: 100%;
  max-width: 500px;
  background: white;
  border-radius: 20px;
  padding: 25px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.15);
  text-align: center;
}

/* UPLOAD BOX */
.upload-box {
  border: 2px dashed #138808;
  border-radius: 15px;
  padding: 25px;
  margin-top: 15px;
  cursor: pointer;
  width: 100%;
  transition: 0.3s;
}

.upload-box:hover {
  background: #f0fff4;
}

.upload-box img {
  width: 100%;
  border-radius: 10px;
}

/* BUTTON */
button {
  margin-top: 15px;
  padding: 12px;
  width: 100%;
  border: none;
  border-radius: 10px;
  background: linear-gradient(90deg,#ff9933,#138808);
  color: white;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  opacity: 0.9;
}

/* RESULT */
#result {
  margin-top: 15px;
  font-weight: bold;
  color: #0a3d62;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="top-nav">
  <button class="menu-btn" onclick="toggleMenu()">☰</button>
  <div class="brand">🌿 KrishiMitr</div>
</div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <a href="#">Dashboard</a>
  <a href="#">Crop Advisor</a>
  <a href="#">Sell Crops</a>
  <a href="#">Settings</a>
</div>

<!-- OVERLAY -->
<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<!-- MAIN -->
<div class="main" id="main">
  <div class="card">
    <h2>Plant Disease Detection</h2>
    <p>Upload a leaf image</p>

    <label class="upload-box">
      <input type="file" id="imageInput" hidden accept="image/*">
      <div id="uploadText">📁 Click to upload image</div>
      <img id="preview" hidden>
    </label>

    <button onclick="analyze()">Analyze</button>

    <div id="result"></div>
  </div>
</div>

<script>
const sidebar = document.getElementById("sidebar");
const overlay = document.getElementById("overlay");
const main = document.getElementById("main");

function toggleMenu() {
  sidebar.classList.toggle("active");

  if (window.innerWidth >= 768) {
    main.classList.toggle("shift");
  } else {
    overlay.classList.toggle("show");
  }
}

function closeMenu() {
  sidebar.classList.remove("active");
  overlay.classList.remove("show");
  main.classList.remove("shift");
}

/* Upload Logic */
const input = document.getElementById("imageInput");
const preview = document.getElementById("preview");
const text = document.getElementById("uploadText");

document.querySelector(".upload-box").onclick = () => input.click();

input.onchange = () => {
  const file = input.files[0];
  if (file) {
    preview.src = URL.createObjectURL(file);
    preview.hidden = false;
    text.style.display = "none";
  }
};

function analyze() {
  const file = input.files[0];

  if (!file) {
    alert("Please upload image first");
    return;
  }

  document.getElementById("result").innerText = "Analyzing image...";
}
</script>

</body>
</html>
