<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title> Disease Detection</title>

<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: "Poppins", sans-serif;
  min-height: 100vh;
  background: linear-gradient(180deg,#f6e2cc 0%,#f7f9f8 50%,#dceee3 100%);
}

/* NAVBAR */
.top-nav {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 70px;
  background: linear-gradient(90deg,#ff9933,#ffffff,#138808);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 18px;
  z-index: 1000;
}

.brand {
  font-weight: 800;
  font-size: 18px;
  color: #0a3d62;
}

.menu-btn {
  font-size: 24px;
  background: none;
  border: none;
  cursor: pointer;
}

/* SIDEBAR */
.sidebar {
  position: fixed;
  top: 70px;
  left: -260px;
  width: 250px;
  height: calc(100vh - 70px);
  background: #0a3d62;
  color: white;
  padding: 20px;
  transition: 0.3s ease;
  z-index: 999;
}

.sidebar.active {
  left: 0;
}

.sidebar a {
  display: block;
  padding: 12px;
  margin-bottom: 10px;
  color: white;
  text-decoration: none;
  border-radius: 8px;
}

.sidebar a:hover {
  background: #1e3a8a;
}

/* OVERLAY */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.3);
  display: none;
  z-index: 998;
}

.overlay.show {
  display: block;
}

/* MAIN */
.main {
  margin-top: 70px;
  padding: 20px;

  display: grid;
  place-items: center; /* BEST CENTERING */

  min-height: calc(100vh - 70px);
}

/* DESKTOP SHIFT */
@media(min-width: 768px) {
  .main.shift {
    margin-left: 250px;
  }
}

/* CARD */
.card {
  width: 100%;
  max-width: 480px;
  background: white;
  border-radius: 18px;
  padding: 25px;
  box-shadow: 0 12px 30px rgba(0,0,0,0.15);
  text-align: center;
}

/* TITLE */
.card h2 {
  margin-bottom: 8px;
  color: #0a3d62;
}

.card p {
  color: #555;
  font-size: 14px;
}

/* UPLOAD BOX */
.upload-box {
  border: 2px dashed #138808;
  border-radius: 14px;

  height: 200px;              /* 🔥 FIX: force big size */
  display: flex;              /* center content */
  flex-direction: column;
  align-items: center;
  justify-content: center;

  margin-top: 20px;
  cursor: pointer;
  width: 100%;
  transition: 0.25s;
  background: #fafafa;
  overflow: hidden;          /* prevents cutting */
font-size: 15px;
color: #444;
}

.upload-box:hover {
  background: #f0fff4;
}

.upload-box img {
  max-height: 100%;
  max-width: 100%;
  object-fit: contain;  /* prevents image cutting */
  border-radius: 10px;
}

/* BUTTON */
button {
  margin-top: 18px;
  padding: 12px;
  width: 100%;
  border: none;
  border-radius: 10px;
  background: linear-gradient(90deg,#ff9933,#138808);
  color: white;
  font-weight: bold;
  font-size: 15px;
  cursor: pointer;
}

button:hover {
  opacity: 0.9;
}

/* RESULT */
#result {
  margin-top: 15px;
  font-weight: bold;
  color: #0a3d62;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="top-nav">
  <button class="menu-btn" onclick="toggleMenu()">☰</button>
  <div class="brand"></div>
</div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <a href="#">Dashboard</a>
  <a href="#">Crop Advisor</a>
  <a href="#">Sell Crops</a>
  <a href="#">Settings</a>
</div>

<!-- OVERLAY -->
<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<!-- MAIN -->
<div class="main" id="main">
  <div class="card">
    <h2>Plant Disease Detection</h2>
    <p>Upload a leaf image</p>

    <label class="upload-box">
      <input type="file" id="imageInput" hidden accept="image/*">
      <div id="uploadText">Click to upload image</div>
      <img id="preview" hidden>
    </label>

    <button onclick="analyze()">Analyze</button>

    <div id="result"></div>
  </div>
</div>

<script>
const sidebar = document.getElementById("sidebar");
const overlay = document.getElementById("overlay");
const main = document.getElementById("main");

function toggleMenu() {
  sidebar.classList.toggle("active");

  if (window.innerWidth >= 768) {
    main.classList.toggle("shift");
  } else {
    overlay.classList.toggle("show");
  }
}

function closeMenu() {
  sidebar.classList.remove("active");
  overlay.classList.remove("show");
  main.classList.remove("shift");
}

/* ===== FAST UPLOAD + CAMERA ===== */

const input = document.getElementById("imageInput");
const preview = document.getElementById("preview");
const text = document.getElementById("uploadText");
const box = document.querySelector(".upload-box");

/* 📸 Allow camera on mobile */
input.setAttribute("capture", "environment");

/* Click box */
box.onclick = () => input.click();

/* 🚀 Fast preview + compression */
input.onchange = () => {
  const file = input.files[0];
  if (!file) return;

  text.innerText = "Loading image...";

  const reader = new FileReader();

  reader.onload = function(e) {
    const img = new Image();

    img.onload = function() {
      const canvas = document.createElement("canvas");
      const ctx = canvas.getContext("2d");

      /* 🔥 Resize image (MAX 600px) */
      let width = img.width;
      let height = img.height;

      const maxSize = 600;

      if (width > height && width > maxSize) {
        height *= maxSize / width;
        width = maxSize;
      } else if (height > maxSize) {
        width *= maxSize / height;
        height = maxSize;
      }

      canvas.width = width;
      canvas.height = height;

      ctx.drawImage(img, 0, 0, width, height);

      /* ⚡ Compress image */
      const compressed = canvas.toDataURL("image/jpeg", 0.7);

      preview.src = compressed;
      preview.hidden = false;
      text.style.display = "none";
    };

    img.src = e.target.result;
  };

  reader.readAsDataURL(file);
};

/* 🧠 Analyze */
function analyze() {
  const file = input.files[0];

  if (!file) {
    alert("Please upload image first");
    return;
  }

  const result = document.getElementById("result");

  result.innerText = "Analyzing...";
  
  /* fake delay (replace with ML API later) */
  setTimeout(() => {
    result.innerText = "Nice picture ";
  }, 1200);
}
</script>
</script>

</body>
</html>
