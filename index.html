<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Scan Crop - Krishimitr</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: "Poppins", sans-serif;
  background: linear-gradient(180deg,#f6e2cc,#e6f5ec);
  min-height: 100vh;
}

/* NAVBAR */
.navbar {
  height: 60px;
  background: #2e7d32;
  color: white;
  display: flex;
  align-items: center;
  padding: 0 20px;
  font-weight: 600;
  font-size: 18px;
}

/* MAIN */
.container {
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 40px 20px;
}

/* CARD */
.card {
  background: white;
  width: 420px;
  border-radius: 20px;
  padding: 30px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
  text-align: center;
}

/* TITLE */
.title {
  font-size: 22px;
  color: #2e7d32;
  margin-bottom: 5px;
}

.subtitle {
  font-size: 14px;
  color: #777;
  margin-bottom: 20px;
}

/* UPLOAD BOX */
.upload-box {
  border: 2px dashed #4caf50;
  border-radius: 15px;
  padding: 30px;
  cursor: pointer;
  transition: 0.3s;
  background: #fafefa;
}

.upload-box:hover {
  background: #f1fff3;
  transform: scale(1.02);
}

.upload-box.dragover {
  background: #e8f5e9;
  border-color: #2e7d32;
}

.upload-box input {
  display: none;
}

.upload-text {
  color: #4caf50;
  font-weight: 500;
}

/* IMAGE PREVIEW */
.preview img {
  width: 100%;
  margin-top: 15px;
  border-radius: 12px;
}

/* BUTTON */
button {
  width: 100%;
  margin-top: 20px;
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: #4caf50;
  color: white;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #388e3c;
}

/* RESULT */
.result {
  margin-top: 20px;
  font-weight: 600;
  color: #333;
}

/* LOADING */
.loader {
  margin-top: 15px;
  display: none;
}
</style>
</head>

<body>

<div class="navbar">
  🌿 Krishimitr
</div>

<div class="container">
  <div class="card">

    <div class="title">Scan Your Crop</div>
    <div class="subtitle">Upload leaf image to detect disease</div>

    <label class="upload-box" id="uploadBox">
      <div class="upload-text">📸 Click or Drag Image Here</div>
      <input type="file" id="imageInput" accept="image/*">
    </label>

    <div class="preview" id="preview"></div>

    <button onclick="analyze()">Analyze Crop</button>

    <div class="loader" id="loader">🔍 Analyzing...</div>
    <div class="result" id="result"></div>

  </div>
</div>

<script>
let selectedFile;

const uploadBox = document.getElementById("uploadBox");
const input = document.getElementById("imageInput");

// Click upload
uploadBox.addEventListener("click", () => input.click());

// File select
input.addEventListener("change", handleFile);

// Drag events
uploadBox.addEventListener("dragover", (e) => {
  e.preventDefault();
  uploadBox.classList.add("dragover");
});

uploadBox.addEventListener("dragleave", () => {
  uploadBox.classList.remove("dragover");
});

uploadBox.addEventListener("drop", (e) => {
  e.preventDefault();
  uploadBox.classList.remove("dragover");
  selectedFile = e.dataTransfer.files[0];
  showPreview(selectedFile);
});

function handleFile(e) {
  selectedFile = e.target.files[0];
  showPreview(selectedFile);
}

function showPreview(file) {
  const img = document.createElement("img");
  img.src = URL.createObjectURL(file);

  const preview = document.getElementById("preview");
  preview.innerHTML = "";
  preview.appendChild(img);
}

function analyze() {
  if (!selectedFile) {
    alert("Please upload an image first");
    return;
  }

  document.getElementById("loader").style.display = "block";
  document.getElementById("result").innerText = "";

  // Fake delay (replace with ML)
  setTimeout(() => {
    document.getElementById("loader").style.display = "none";
    document.getElementById("result").innerText = "🌱 Result will appear here";
  }, 1500);
}
</script>

</body>
</html>
